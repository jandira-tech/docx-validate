name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

permissions:
    contents: read

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5

            - uses: actions/setup-node@v5
              with:
                  node-version: "20"

            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Type-check
              run: bunx tsc --noEmit

            - name: Lint
              run: bun run lint:fix

            - name: Format check
              run: bun run fmt:fix

            - name: Test
              # libxmljs2 is a native Node addon and crashes under Bun's runtime,
              # so the test runner has to be Node. See CLAUDE.md "Verification".
              run: npx vitest run --coverage

            - name: Upload coverage to Codecov
              uses: codecov/codecov-action@v5
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}
                  files: ./coverage/lcov.info
                  fail_ci_if_error: false
                  verbose: true

            - name: Build
              run: bun run build
